name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: driving_school
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/driving_school?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/driving_school?schema=public
      NEXTAUTH_SECRET: test_secret
      NEXTAUTH_URL: http://localhost:3000
      JWT_SECRET: test_jwt_secret
      COOKIE_SECRET: test_cookie
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run prisma:generate
      - run: npm run prisma:migrate -- --name ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
